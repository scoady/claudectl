replicas: 1

persistence:
  enabled: true
  size: 1Gi

env:
  GF_INSTALL_PLUGINS: "yesoreyeram-infinity-datasource"
  GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: "scoady-claudectl-app"

adminUser: admin
adminPassword: admin

grafana.ini:
  paths:
    plugins: "/var/lib/grafana/plugins-rw"
  server:
    root_url: "http://grafana.localhost"
  plugins:
    allow_loading_unsigned_plugins: "scoady-claudectl-app"
    enable_alpha: true
  auth.anonymous:
    enabled: true
    org_role: Viewer
  users:
    default_theme: dark
  security:
    allow_embedding: true

resources:
  limits:
    memory: 256Mi
    cpu: 200m
  requests:
    memory: 128Mi
    cpu: 100m

ingress:
  enabled: true
  ingressClassName: nginx
  hosts:
    - grafana.localhost

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Claude Manager
        type: yesoreyeram-infinity-datasource
        access: proxy
        url: http://backend.claude-manager.svc.cluster.local:4040
        isDefault: true
        editable: true
        jsonData:
          auth_method: ""

      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo.observability.svc.cluster.local:3200
        editable: true
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            filterByTraceID: true
          nodeGraph:
            enabled: true

      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki.observability.svc.cluster.local:3100
        editable: true
        jsonData:
          derivedFields:
            - datasourceUid: tempo
              matcherRegex: '"trace_id":"(\w+)"'
              name: TraceID
              url: '$${__value.raw}'

      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus-server.observability.svc.cluster.local:9090
        editable: true

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: "Claude Manager"
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

dashboardsConfigMaps:
  default: grafana-dashboards

initChownData:
  enabled: false

extraVolumeMounts:
  - name: plugins-rw
    mountPath: /var/lib/grafana/plugins-rw

extraVolumes:
  - name: plugins-rw
    emptyDir: {}
  - name: scenes-plugin-cm
    configMap:
      name: grafana-scenes-plugin

extraConfigmapMounts:
  - name: plugin-provisioning
    configMap: grafana-plugin-provisioning
    mountPath: /etc/grafana/provisioning/plugins/app.yaml
    subPath: app.yaml
    readOnly: true

extraInitContainers:
  - name: install-scenes-plugin
    image: busybox:1.36
    command: ['sh', '-c']
    args:
      - |
        mkdir -p /plugins/scoady-claudectl-app/img
        cp /plugin-src/module.js /plugins/scoady-claudectl-app/module.js
        cp /plugin-src/plugin.json /plugins/scoady-claudectl-app/plugin.json
        cp /plugin-src/logo.svg /plugins/scoady-claudectl-app/img/logo.svg
        echo "Scenes plugin installed:"
        ls -la /plugins/scoady-claudectl-app/
    volumeMounts:
      - name: scenes-plugin-cm
        mountPath: /plugin-src
        readOnly: true
      - name: plugins-rw
        mountPath: /plugins
